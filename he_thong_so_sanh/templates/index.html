<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống So Sánh Giá - Dark Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 1. ĐỔI MÀU NỀN SANG MÀU ĐEN (DARK THEME) */
        body {
            background-color: #0f0f11;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tùy chỉnh thanh Navbar */
        .navbar {
            background-color: #16161a !important;
            border-bottom: 1px solid #232329;
        }

        /* Thẻ hiển thị nội dung (Card) và Hiệu ứng Nổi (Hover) */
        .custom-card {
            background-color: #16161a;
            border: 1px solid #232329;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .custom-card:hover {
            transform: translateY(-5px);
            border-color: #0d6efd;
            box-shadow: 0 12px 30px rgba(13, 110, 253, 0.2);
        }

        /* Tùy chỉnh ô tìm kiếm & Hiệu ứng Glow */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .search-input {
            background-color: #1f1f24 !important;
            border: 1px solid #2d2d35 !important;
            color: #ffffff !important;
            border-radius: 8px !important;
            padding-right: 45px;
            height: 50px;
            transition: all 0.3s;
        }

        .search-input:focus {
            box-shadow: 0 0 15px rgba(13, 110, 253, 0.4) !important;
            border-color: #0d6efd !important;
            outline: none;
        }

        .search-input::placeholder {
            color: #72727e;
        }

        /* Nút TÌM KIẾM NGAY Gradient */
        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* THIẾT KẾ NÚT CLEAR */
        .clear-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #72727e;
            font-size: 18px;
            cursor: pointer;
            display: none;
            transition: color 0.2s;
            z-index: 5;
        }

        .clear-btn:hover {
            color: #ffffff;
        }

        /* Tùy chỉnh Dropdown Menu */
        .dropdown-menu-dark {
            background-color: #16161a;
            border: 1px solid #2d2d35;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .dropdown-item { color: #ffffff; }
        .dropdown-item:hover { background-color: #232329; color: #fff; }

        /* ================================================= */
        /* HIỆU ỨNG SKELETON LOADING                         */
        /* ================================================= */
        .skeleton-card {
            background-color: #16161a;
            border: 1px solid #232329;
            border-radius: 12px;
            padding: 15px;
            height: 100%;
        }

        .skeleton-box {
            background: linear-gradient(90deg, #232329 25%, #2d2d35 50%, #232329 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        .skel-img { height: 200px; width: 100%; margin-bottom: 15px; }
        .skel-title { height: 20px; width: 90%; margin-bottom: 15px; }
        .skel-price { height: 25px; width: 50%; margin-top: auto; margin-bottom: 15px; }
        .skel-badge { height: 32px; width: 70px; }
        .skel-btn { height: 32px; width: 95px; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="/">🔍 SO SÁNH GIÁ</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Danh mục sản phẩm
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item d-flex align-items-center justify-content-between" href="/?keyword=iPhone">
                                    <span>📱 Điện thoại</span>
                                    <span class="badge bg-primary rounded-pill ms-2">8</span>
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card custom-card p-4">
                    <form action="/search" method="GET">
                        <div class="search-container mb-3">
                            <input type="text" name="keyword" id="searchInput" class="form-control search-input" 
                                   placeholder="Nhập tên sản phẩm cần tìm kiếm..."
                                   value="{{ keyword if keyword else '' }}">
                            <button type="button" id="clearBtn" class="clear-btn" title="Xóa văn bản">✕</button>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2" style="border-radius: 8px;">Tìm Kiếm Ngay</button>
                    </form>
                </div>
            </div>
        </div>

        {% if keyword %}
        {% endif %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Xử lý nút Clear
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        if (searchInput.value.length > 0) clearBtn.style.display = 'block';
        searchInput.addEventListener('input', function() {
            clearBtn.style.display = (this.value.length > 0) ? 'block' : 'none';
        });
        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            this.style.display = 'none';
            searchInput.focus();
        });

        // Xử lý Skeleton
        const skel = document.getElementById('skeleton-container');
        const real = document.getElementById('real-data-container');
        if (skel && real) {
            setTimeout(() => {
                skel.style.display = 'none';
                real.style.display = 'flex';
            }, 800);
        }
    </script>
</body>
</html>
