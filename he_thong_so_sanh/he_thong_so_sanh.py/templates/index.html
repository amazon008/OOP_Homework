<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống So Sánh Giá - Dark Mode</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* 1. ĐỔI MÀU NỀN SANG MÀU ĐEN (DARK THEME) */
        body {
            background-color: #0f0f11; /* Màu nền đen mờ cao cấp giống video */
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tùy chỉnh thanh Navbar */
        .navbar {
            background-color: #16161a !important;
            border-bottom: 1px solid #232329;
        }

        /* Thẻ hiển thị nội dung (Card) màu xám tối */
        .custom-card {
            background-color: #16161a;
            border: 1px solid #232329;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        /* Tùy chỉnh ô tìm kiếm giống trong video */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .search-input {
            background-color: #1f1f24 !important;
            border: 1px solid #2d2d35 !important;
            color: #ffffff !important;
            border-radius: 8px !important;
            padding-right: 45px; /* Chừa khoảng trống cho nút Clear */
            height: 50px;
        }

        .search-input::placeholder {
            color: #72727e;
        }

        /* 2. THIẾT KẾ NÚT CLEAR TỰA CÁC ICON TRONG VIDEO */
        .clear-btn {
            position: absolute;
            right: 15px;
            background: none;
            border: none;
            color: #72727e;
            font-size: 18px;
            cursor: pointer;
            display: none; /* Mặc định ẩn, có chữ mới hiện */
            transition: color 0.2s;
            z-index: 5;
        }

        .clear-btn:hover {
            color: #ffffff;
        }

        /* Tùy chỉnh giao diện Dropdown Menu */
        .dropdown-menu-dark {
            background-color: #16161a;
            border: 1px solid #2d2d35;
            margin-top: 5px !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .dropdown-item:hover {
            background-color: #232329;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="#">🔍 SO SÁNH GIÁ</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown" id="smartDropdown">
                        <a class="nav-link dropdown-toggle text-white fw-semibold" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Danh mục sản phẩm
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">📱 Điện thoại</a></li>
                            <li><a class="dropdown-item" href="#">💻 Laptop</a></li>
                            <li><a class="dropdown-item" href="#">🖱️ Chuột Máy Tính</a></li>
                            <li><hr class="dropdown-divider" style="border-color: #2d2d35;"></li>
                            <li><a class="dropdown-item" href="#">ℹ️ Giới thiệu / Liên hệ</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <h1 class="display-6 fw-bold text-white mb-2">Hệ Thống So Sánh Giá</h1>
                <p style="color: #a1a1aa;">Tìm kiếm thông minh, tối ưu chi phí mua sắm của bạn</p>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card custom-card p-4">
                    <form action="/search" method="GET">
                        <div class="search-container mb-3">
                            <input type="text" name="keyword" id="searchInput" class="form-control search-input" placeholder="Nhập tên sản phẩm cần tìm kiếm...">
                            
                            <button type="button" id="clearBtn" class="clear-btn" title="Xóa văn bản">✕</button>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2" style="border-radius: 8px;">Tìm Kiếm Ngay</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // --- 1. XỬ LÝ NÚT CLEAR TÌM KIẾM ---
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');

        // Lắng nghe khi người dùng gõ chữ
        searchInput.addEventListener('input', function() {
            if (this.value.length > 0) {
                clearBtn.style.display = 'block'; // Hiện nút X khi có chữ
            } else {
                clearBtn.style.display = 'none'; // Ẩn đi khi ô trống
            }
        });

        // Hành động khi nhấn vào nút X (Clear)
        clearBtn.addEventListener('click', function() {
            searchInput.value = ''; // Xóa sạch chữ
            this.style.display = 'none'; // Ẩn chính nó đi
            searchInput.focus(); // Đưa con trỏ chuột trở lại ô nhập
        });


        // --- 2. XỬ LÝ DROPDOWN: ẤN THÌ HIỆN - DI CHUỘT RA NGOÀI THÌ BIẾN MẤT ---
        const smartDropdown = document.getElementById('smartDropdown');
        const dropdownToggle = smartDropdown.querySelector('.dropdown-toggle');
        
        // Khởi tạo bộ điều khiển Dropdown của Bootstrap
        const bsDropdown = new bootstrap.Dropdown(dropdownToggle);

        // Sự kiện: Khi con chuột rời khỏi toàn bộ vùng của Danh mục (bao gồm cả bảng menu đang thả xuống)
        smartDropdown.addEventListener('mouseleave', function() {
            // Kiểm tra nếu menu đang mở thì mới đóng
            if (dropdownToggle.classList.contains('show')) {
                bsDropdown.hide(); 
            }
        });
    </script>
</body>
</html>
